name: Generate SBOM via Witness + SBOMit (Reusable)

on:
  workflow_call:
    inputs:
      build_command:
        required: true
        type: string
      format:
        required: false
        type: string
        default: 'cdx15'
      catalog:
        required: false
        type: string
        default: ''
      witness_version:
        required: false
        type: string
        default: '0.11.0'
      sbomit_commit:
        required: false
        type: string
        default: '4dba97c4c88d'

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: false

      - name: Ensure witness + sbomit on PATH
        run: |
          set -e
          if ! command -v witness >/dev/null 2>&1; then
            cd /tmp
            base="https://github.com/in-toto/witness/releases/download/v${{ inputs.witness_version }}"
            curl -fsSLO "$base/witness_${{ inputs.witness_version }}_linux_amd64.tar.gz"
            curl -fsSLO "$base/witness_${{ inputs.witness_version }}_checksums.txt"
            grep "linux_amd64.tar.gz$" "witness_${{ inputs.witness_version }}_checksums.txt" | sha256sum -c -
            tar -xzf "witness_${{ inputs.witness_version }}_linux_amd64.tar.gz" witness
            sudo install -m 0755 witness /usr/local/bin/witness
            cd - >/dev/null
          fi
          command -v sbomit  >/dev/null 2>&1 || go install github.com/sbomit/sbomit@${{ inputs.sbomit_commit }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate ephemeral signing key
        run: openssl genpkey -algorithm ed25519 -out witness-signer.pem

      - name: Run build under witness
        run: |
          set -e
          # ptrace backend (default). eBPF (go-witness PR #740) is not merged.
          # When it lands, add: --trace-backend ebpf  (and grant the runner CAP_BPF).
          witness run \
            --step build \
            --trace \
            --signer-file-key-path witness-signer.pem \
            --outfile attestation.json \
            -- bash -c "${{ inputs.build_command }}"

      - name: Generate SBOM
        run: |
          set -e
          if [ -n "${{ inputs.catalog }}" ]; then
            sbomit generate attestation.json --format "${{ inputs.format }}" --name "${{ github.repository }}" --version "${{ github.sha }}" --catalog "${{ inputs.catalog }}" --project-dir . --output "sbom.${{ inputs.format }}.json"
          else
            sbomit generate attestation.json --format "${{ inputs.format }}" --name "${{ github.repository }}" --version "${{ github.sha }}" --output "sbom.${{ inputs.format }}.json"
          fi

      - name: Upload SBOM + attestation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-witness-${{ github.event.repository.name }}
          path: |
            sbom.${{ inputs.format }}.json
            attestation.json
          if-no-files-found: error